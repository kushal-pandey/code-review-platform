spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codereview}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: ${PORT:8080}

gemini:
  api:
    key: ${GEMINI_API_KEY}